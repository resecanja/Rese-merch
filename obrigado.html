<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Obrigado! &middot; Loja Rese</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://merch.rese.com.br/obrigado.html">
<link rel="icon" type="image/png" href="https://static.wixstatic.com/media/92b30e_4e79262f65424377a74a91074905556f~mv2.png/v1/fill/w_192,h_192/92b30e_4e79262f65424377a74a91074905556f~mv2.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--paper:#ece4d3;--ink:#1a1412;--ink-mute:rgba(22,18,15,.55);--red:#c9342a;--serif:'DM Serif Display',Georgia,serif;--type:'Special Elite',monospace}
html,body{background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 24px;gap:24px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--red);display:inline-block;margin-right:10px;vertical-align:middle}
.brand{font-family:var(--type);font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px}
h1{font-family:var(--serif);font-size:54px;font-style:italic;line-height:1.05;max-width:520px}
p{font-family:var(--type);font-size:14px;letter-spacing:.04em;color:var(--ink-mute);max-width:480px;line-height:1.7}
.cta{display:inline-flex;gap:14px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.btn{background:var(--ink);color:var(--paper);border:none;cursor:pointer;padding:14px 22px;border-radius:2px;font-family:var(--type);font-size:12px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:background .15s}
.btn:hover{background:var(--red)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid rgba(22,18,15,.18)}
.btn-ghost:hover{background:rgba(22,18,15,.06);color:var(--ink)}
</style>
</head>
<body>
<div class="brand"><span class="dot"></span>LOJA RESE</div>
<h1>Pedido recebido.<br>Valeu demais!</h1>
<p>O Mercado Pago vai te enviar a confirmação por email assim que o pagamento for aprovado.<br>Em pré-vendas, o envio começa quando a tiragem fechar &mdash; te aviso por aqui.</p>
<p>Qualquer coisa, chama no WhatsApp.</p>
<div class="cta">
<a class="btn" href="https://wa.me/5541991847007?text=Oi%20Rese%2C%20acabei%20de%20fazer%20um%20pedido%20no%20merch">WhatsApp</a>
<a class="btn btn-ghost" href="/">Voltar pra loja</a>
</div>
</body>
</html>
